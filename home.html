<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="barra-nav">
    <div class="logo">♥</div>
    <div class="menu-nav">
      <a href="#" class="item-nav ativo">Início</a>
      <a href="#" class="item-nav"> Reviews</a>
      <a href="#" class="item-nav">Perfil</a>
    </div>
  </nav>

  <main class="conteudo-principal">

    <section class="secao-destaque">
      <div class="carrossel">
        <div class="imagem-destaque">
          <img src="pokopia.png" class="img-placeholder">
        </div>
      </div>
      <div class="info-jogo-destaque">
        <span class="nome-jogo">Pokemon Pokopia</span>
        <span class="nota-jogo">⭐ 4.8</span>
      </div>
    </section>

    <section class="secao-generica">
      <h2 class="titulo-secao">Dicas e reviews recentes</h2>
      <div class="grade-cards">
        <div class="card-vazio"></div>
        <div class="card-vazio"></div>
        <div class="card-vazio"></div>
      </div>
    </section>

    <section class="secao-generica">
      <h2 class="titulo-secao">Artigos/noticias</h2>
      <div class="grade-artigos">
        <div class="card-artigo">
          <div class="imagem-artigo"></div>
          <button class="btn-ler-mais">Ler mais</button>
        </div>
        <div class="card-artigo">
          <div class="imagem-artigo"></div>
          <button class="btn-ler-mais">Ler mais</button>
        </div>
        <div class="card-artigo">
          <div class="imagem-artigo"></div>
          <button class="btn-ler-mais">Ler mais</button>
        </div>
        <div class="card-artigo">
          <div class="imagem-artigo"></div>
          <button class="btn-ler-mais">Ler mais</button>
        </div>
      </div>
    </section>

    <section class="secao-quiz"></section>
      <button class="btn-quiz">Descubra qual personagem de Alice você é:
      </button>
      <div class="caixa-quiz">
        <p class="progresso-quiz">Questão 2 de 10</p>
        <div class="barra-progresso">
          <div class="barra-progresso-preenchida"></div>
        </div>
        <p class="pergunta-quiz">Qual sua comida favorita?</p>
        <div class="opcoes-quiz">
          <button class="opcao-quiz">Chá e bolinhos 🫖</button>
          <button class="opcao-quiz">Algo doce e colorido (tipo doces malucos) 🍭</button>
          <button class="opcao-quiz">Algo sofisticado e elegante 🍷</button>
        </div>
      </div>
    </section>

  </main>

</body>
</html>

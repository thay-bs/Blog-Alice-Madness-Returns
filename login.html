<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Alice | Login</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="styleLogin.css" />

  <style>
    .erro {
      color: red;
      font-size: 12px;
      display: none;
    }
  </style>
</head>

<body onload="listar()">

  <!-- ALERTA -->
  <div class="alerta_erro">
    <div class="card_erro" id="cardErro">
      <span id="mensagem_erro"></span>
    </div>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="header-logo">
    </div>
    <ul class="navbar">
      <li><a href="index.html">Início</a></li>
      <li><a href="simulador.html">Reviews</a></li>
      <li><a href="login.html">Perfil</a></li>
    </ul>
  </div>

  <!-- MAIN -->
  <div class="main-content">
    <div class="card-cadastro">

      <div class="card-left">
        <h2>Bem-vindo de volta!</h2>

        <div class="formulario">

          <div class="campo">
            <span>Usuário ou E-mail:</span>
            <input id="usuario_input" type="text" />
            <span id="usuario-error" class="erro">Campo obrigatório</span>
          </div>

          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" />
            <span id="senha-error" class="erro">Senha obrigatória</span>
          </div>

          <button type="button" class="botao" onclick="entrar()">ENTRAR</button>

        </div>

        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" />
        </div>

      </div>

      <div class="card-right">
        <img src="kirby.png" alt="Ilustração" />
      </div>

    </div>
  </div>

  <div class="footer">
    <span class="version">v1.0.0</span>
  </div>

  <!-- SCRIPT -->
  <script>
    function entrar() {

      let usuario = document.getElementById("usuario_input").value;
      let senha = document.getElementById("senha_input").value;

      let valido = true;

      // USUARIO
      if (usuario === '') {
        valido = false;
        document.getElementById("usuario-error").style.display = "block";
      } else {
        document.getElementById("usuario-error").style.display = "none";
      }

      // SENHA
      if (senha === '') {
        valido = false;
        document.getElementById("senha-error").style.display = "block";
      } else {
        document.getElementById("senha-error").style.display = "none";
      }

      // SUCESSO (simulado)
      if (valido) {
        document.getElementById("cardErro").style.display = "block";
        document.getElementById("mensagem_erro").innerHTML = "Login realizado!";

        setTimeout(() => {
          document.getElementById("cardErro").style.display = "none";
          window.location.href = "./index.html";
        }, 1500);
      }
    }
  </script>

</body>
</html>
